<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ccc; font: 14px/1.4 sans-serif; padding: 20px; }
h1 { color: #fff; margin-bottom: 12px; }
h2 { color: #8af; margin: 20px 0 8px; font-size: 16px; }
.cards { display: flex; flex-wrap: wrap; gap: 16px; }
.card { background: #1a1a1a; border-radius: 8px; padding: 10px; width: 290px; cursor: pointer; border: 2px solid transparent; transition: .15s; }
.card:hover { border-color: #48f; }
.card.selected { border-color: #0f0; background: #0a1a0a; }
.card canvas { width: 256px; height: 256px; display: block; margin: 0 auto; image-rendering: pixelated; }
.card .label { margin-top: 6px; font-size: 13px; color: #aaa; text-align: center; }
.card .desc { font-size: 11px; color: #666; text-align: center; margin-top: 2px; }
.tile-info { color: #888; font-size: 12px; margin-bottom: 12px; }
</style>
</head>
<body>

<h1>CartoDB light_all — варианты ColorMatrix</h1>
<div class="tile-info">Тайл: zoom 14, Санкт-Петербург. Каждый canvas 256×256 px.</div>

<div class="cards" id="cards"></div>

<script>
// CartoDB light_all tile (same URL as in app)
const TILE_URL = 'https://a.basemaps.cartocdn.com/light_all/14/9570/4762.png';

const VARIANTS = [
  {
    id: 'original',
    label: 'Оригинал (без фильтра)',
    desc: 'Исходный CartoDB light_all тайл',
    matrix: null
  },
  {
    id: 'a_75pct',
    label: 'A — 75% без фильтра',
    desc: 'Только альфа 191, без ColorMatrix',
    matrix: null,
    alpha: 0.75
  },
  {
    id: 'b_sat',
    label: 'B — Насыщенность 2.0×',
    desc: 'saturation(2.0), без контраста',
    matrix: null,
    type: 'saturation',
    value: 2.0
  },
  {
    id: 'c_dark_sat',
    label: 'C — Затемнение + sat',
    desc: 'bright×0.55, sat×1.8',
    matrix: [0.55, 0, 0, 0, 0,
             0, 0.55, 0, 0, 0,
             0, 0, 0.55, 0, 0,
             0, 0, 0, 1, 0],
    extraSat: 1.8
  },
  {
    id: 'd_invert',
    label: 'D — Инверсия + синий',
    desc: 'invert + blue shift (night mode)',
    matrix: [-0.5, 0, 0, 0, 200,
             0, -0.4, 0, 0, 150,
             0, 0, -0.3, 0, 180,
             0, 0, 0, 1, 0]
  },
  {
    id: 'e_moderate',
    label: 'E — Умеренный контраст',
    desc: 'contrast 1.3, brightness -36',
    matrix: [1.3, 0, 0, 0, -36,
             1.3, 0, 0, 0, -36,
             1.3, 0, 0, 0, -36,
             0, 0, 0, 1, 0],
    skipSat: true
  },
  {
    id: 'f_blue_tint',
    label: 'F — Синий оттенок',
    desc: 'grayscale + blue tint, contrast 1.5',
    matrix: [0.4, 0.4, 0.2, 0, 0,
             0.2, 0.3, 0.5, 0, 0,
             0.1, 0.2, 0.7, 0, 0,
             0, 0, 0, 1, 0]
  },
  {
    id: 'g_posterize',
    label: 'G — Постеризация мягкая',
    desc: 'contrast 1.6, -51 offset, sat 1.5',
    matrix: [1.6, 0, 0, 0, -51,
             0, 1.6, 0, 0, -51,
             0, 0, 1.6, 0, -51,
             0, 0, 0, 1, 0],
    extraSat: 1.5
  }
];

function applyColorMatrix(ctx, width, height, matrix) {
  if (!matrix) return;
  const imgData = ctx.getImageData(0, 0, width, height);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    d[i]   = Math.max(0, Math.min(255, matrix[0]*r + matrix[1]*g + matrix[2]*b + matrix[3]*255 + matrix[4] + 0.5));
    d[i+1] = Math.max(0, Math.min(255, matrix[5]*r + matrix[6]*g + matrix[7]*b + matrix[8]*255 + matrix[9] + 0.5));
    d[i+2] = Math.max(0, Math.min(255, matrix[10]*r + matrix[11]*g + matrix[12]*b + matrix[13]*255 + matrix[14] + 0.5));
  }
  ctx.putImageData(imgData, 0, 0);
}

function applySaturation(ctx, width, height, factor) {
  const imgData = ctx.getImageData(0, 0, width, height);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    const lum = 0.299 * r + 0.587 * g + 0.114 * b;
    d[i]   = Math.max(0, Math.min(255, lum + (r - lum) * factor + 0.5));
    d[i+1] = Math.max(0, Math.min(255, lum + (g - lum) * factor + 0.5));
    d[i+2] = Math.max(0, Math.min(255, lum + (b - lum) * factor + 0.5));
  }
  ctx.putImageData(imgData, 0, 0);
}

function applyAlpha(ctx, width, height, alpha) {
  const imgData = ctx.getImageData(0, 0, width, height);
  const d = imgData.data;
  for (let i = 3; i < d.length; i += 4) {
    d[i] = Math.round(d[i] * alpha);
  }
  ctx.putImageData(imgData, 0, 0);
}

function loadTile(variant) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => {
      // fallback: draw a gray placeholder with text
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#444';
      ctx.fillRect(0, 0, 256, 256);
      ctx.fillStyle = '#fff';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Tile load failed', 128, 128);
      resolve(c);
    };
    img.src = TILE_URL;
  });
}

async function renderAll() {
  const img = await loadTile();
  const container = document.getElementById('cards');

  for (const v of VARIANTS) {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    };

    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    // Draw tile
    if (img instanceof HTMLCanvasElement) {
      ctx.drawImage(img, 0, 0);
    } else {
      ctx.drawImage(img, 0, 0);
    }

    // Apply effects
    if (v.type === 'saturation') {
      applySaturation(ctx, 256, 256, v.value);
    } else if (v.matrix) {
      // If it has extraSat, apply saturation first
      if (v.extraSat && !v.skipSat) {
        // Clone state
        const preData = ctx.getImageData(0, 0, 256, 256);
        applySaturation(ctx, 256, 256, v.extraSat);
        // Then matrix
        applyColorMatrix(ctx, 256, 256, v.matrix);
      } else if (v.extraSat && v.skipSat) {
        // Just contrast matrix, no saturation
        applyColorMatrix(ctx, 256, 256, v.matrix);
      } else {
        applyColorMatrix(ctx, 256, 256, v.matrix);
      }
    }

    // Apply alpha
    const alpha = v.alpha || (v.id.startsWith('a_') || v.id === 'original' ? 1.0 : 0.75);
    if (alpha < 1.0 && v.id !== 'original') {
      applyAlpha(ctx, 256, 256, alpha);
    }

    // Label
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = v.label;
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = v.desc;

    card.appendChild(canvas);
    card.appendChild(label);
    card.appendChild(desc);
    container.appendChild(card);
  }
}

renderAll();
</script>
</body>
</html>
