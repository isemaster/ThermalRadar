<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки — ThermalRadar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 400px;
    max-width: 100%;
    background: #0d0d0d;
    border-radius: 20px;
    border: 1px solid #1a3a1a;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,255,0,0.05);
  }
  .screen {
    padding: 20px 24px;
  }
  h1 {
    font-size: 19px;
    font-weight: bold;
    color: #4caf50;
    font-family: "Courier New", monospace;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    margin: 6px 0;
    background: rgba(0,255,0,0.06);
    border: 1px solid rgba(0,255,0,0.12);
    border-radius: 8px;
    color: #4caf50;
    font-family: "Courier New", monospace;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }
  .btn:hover { background: rgba(0,255,0,0.12); }
  .btn-back {
    background: rgba(0,200,0,0.08);
    border-color: rgba(0,200,0,0.2);
    margin-bottom: 16px;
  }
  .btn-exit {
    background: rgba(255,50,50,0.06);
    border-color: rgba(255,50,50,0.15);
    color: #ff6060;
    margin-top: 20px;
  }
  .btn-exit:hover { background: rgba(255,50,50,0.12); }
  .btn-test {
    background: rgba(255,235,59,0.08);
    border-color: rgba(255,235,59,0.15);
    color: #ffeb3b;
  }
  .btn-test:hover { background: rgba(255,235,59,0.15); }
  .checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    font-size: 14px;
    font-family: "Courier New", monospace;
    color: #4caf50;
    cursor: pointer;
  }
  .checkbox input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: #4caf50;
    cursor: pointer;
  }
  .slider-label {
    font-size: 14px;
    font-family: "Courier New", monospace;
    color: #4caf50;
    margin: 16px 0 6px;
  }
  .slider-value {
    font-size: 13px;
    color: #ffeb3b;
    margin-bottom: 4px;
  }
  .slider-track {
    height: 4px;
    background: #1a3a1a;
    border-radius: 2px;
    position: relative;
    margin: 8px 0;
  }
  .slider-fill {
    width: 50%;
    height: 100%;
    background: #4caf50;
    border-radius: 2px;
  }
  .slider-thumb {
    position: absolute;
    top: -6px;
    left: 50%;
    width: 16px;
    height: 16px;
    background: #4caf50;
    border-radius: 50%;
    transform: translateX(-50%);
  }
  .info {
    font-size: 11px;
    font-family: "Courier New", monospace;
    color: rgba(0,255,0,0.35);
    line-height: 1.6;
    margin-top: 24px;
  }
  .divider { height: 1px; background: rgba(0,255,0,0.06); margin: 16px 0; }
  .spacer { height: 24px; }
  .strikethrough {
    text-decoration: line-through;
    opacity: 0.4;
  }
  .badge-new {
    display: inline-block;
    background: rgba(255,235,59,0.15);
    color: #ffeb3b;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    font-family: "Courier New", monospace;
  }
  .badge-removed {
    display: inline-block;
    background: rgba(255,50,50,0.1);
    color: #ff6060;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    font-family: "Courier New", monospace;
    text-decoration: line-through;
  }
</style>
</head>
<body>
<div class="phone">
<div class="screen">

  <h1>⚙️ НАСТРОЙКИ</h1>

  <!-- Back -->
  <div class="btn btn-back">← НАЗАД</div>

  <div class="divider"></div>

  <!-- Checkboxes -->
  <label class="checkbox"><input type="checkbox" checked> Звук</label>
  <label class="checkbox"><input type="checkbox" checked> Вибрация</label>
  <label class="checkbox"><input type="checkbox"> Слепой полёт (карман)</label>
  <label class="checkbox"><input type="checkbox" checked> Голосовые подсказки</label>
  <label class="checkbox"><input type="checkbox"> Солнечный режим (яркие цвета)</label>

  <div class="divider"></div>

  <!-- Airspeed -->
  <div class="slider-label">Воздушная скорость</div>
  <div class="slider-value">9.5 м/с</div>
  <div class="slider-track"><div class="slider-fill" style="width:21%"></div><div class="slider-thumb" style="left:21%"></div></div>

  <div class="spacer"></div>

  <!-- Color scheme -->
  <div class="slider-label">Цветовая схема</div>
  <label class="checkbox"><input type="radio" name="scheme" checked> Тёмная</label>
  <label class="checkbox"><input type="radio" name="scheme"> Светлая</label>
  <label class="checkbox"><input type="radio" name="scheme"> Высокий контраст</label>

  <div class="spacer"></div>

  <!-- Simulate → Flight Test (REPLACED) -->
  <div class="btn btn-test">✈️ ТЕСТ ПОЛЁТА (100С)</div>

  <div class="spacer"></div>

  <!-- Vario smoothing -->
  <div class="slider-label">Сглаживание варио</div>
  <div class="slider-value">30 выборок</div>
  <div class="slider-track"><div class="slider-fill" style="width:28%"></div><div class="slider-thumb" style="left:28%"></div></div>

  <div class="spacer"></div>

  <!-- Calibration -->
  <div class="btn">СБРОС КАЛИБРОВКИ</div>

  <div class="spacer"></div>

  <!-- Send logs -->
  <div class="btn">ОТПРАВИТЬ ЛОГИ</div>

  <!-- Version info -->
  <div class="info">
    Версия: 0.1.5<br>
    Логи: /storage/emulated/0/Android/.../logs/
  </div>

  <!-- Exit -->
  <div class="btn btn-exit">ВЫХОД</div>

  <div class="spacer"></div>

  <!-- Legend -->
  <div style="font-size:11px; font-family:'Courier New',monospace; color:rgba(255,255,255,0.2); margin-top:8px; line-height:1.8;">
    <span style="background:rgba(255,235,59,0.1);color:#ffeb3b;padding:1px 6px;border-radius:4px;">✈️</span> — старая «Симуляция» заменена на тест полёта
  </div>

</div>
</div>
</body>
</html>
